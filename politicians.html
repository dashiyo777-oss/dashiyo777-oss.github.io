<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>統覧 TORAN — 政治家ランキング</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500;600&family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #06080f;
      --card:     #0d1426;
      --mid:      #111827;
      --red:      #e6384f;
      --blue:     #4a8fd4;
      --gold:     #f5c842;
      --green:    #4ac776;
      --orange:   #f0a030;
      --text:     #dde3f0;
      --gray:     #6878a0;
      --border:   rgba(74,144,226,0.12);
      --border-h: rgba(74,144,226,0.28);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', 'Noto Serif JP', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(6,8,15,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      text-decoration: none;
    }
    .logo-ja {
      font-family: 'Noto Serif JP', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.12em;
    }
    .logo-en {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--gray);
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .nav-link {
      font-size: 0.75rem;
      color: var(--gray);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--text); }
    .nav-link.back::before { content: '← '; }

    /* ── HERO ── */
    .hero {
      padding: 4rem 2rem 3rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(74,143,212,0.04) 0%, transparent 100%);
    }
    .hero-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      color: var(--blue);
      text-transform: uppercase;
      margin-bottom: 1rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
    }
    .hero-title {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }
    .hero-title span {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--blue);
      font-size: 1.1em;
    }
    .hero-tagline {
      font-size: 0.85rem;
      color: var(--gray);
      letter-spacing: 0.08em;
      margin-bottom: 2.5rem;
      font-family: 'Noto Serif JP', serif;
    }

    .stats-grid {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .stat-item {
      text-align: center;
    }
    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }
    .stat-num.blue { color: var(--blue); }
    .stat-num.green { color: var(--green); }
    .stat-num.orange { color: var(--orange); }
    .stat-num.gold { color: var(--gold); }
    .stat-label {
      font-size: 0.7rem;
      color: var(--gray);
      letter-spacing: 0.08em;
      margin-top: 0.25rem;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      position: sticky;
      top: 60px;
      z-index: 90;
      background: rgba(13,20,38,0.97);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 2rem;
    }

    .filter-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 180px;
    }
    .search-icon {
      position: absolute;
      left: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      font-size: 0.85rem;
      pointer-events: none;
    }
    .filter-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem 0.5rem 2.1rem;
      color: var(--text);
      font-size: 0.82rem;
      font-family: 'Noto Serif JP', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .filter-input:focus { border-color: var(--blue); }
    .filter-input::placeholder { color: var(--gray); }

    .filter-select {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      color: var(--text);
      font-size: 0.8rem;
      font-family: 'Noto Serif JP', sans-serif;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .filter-select:focus { border-color: var(--blue); }
    .filter-select option { background: #111827; }

    .filter-toggle {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--gray);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-toggle.active {
      border-color: var(--orange);
      color: var(--orange);
      background: rgba(240,160,48,0.08);
    }

    .result-count {
      max-width: 1100px;
      margin: 0.6rem auto 0;
      font-size: 0.75rem;
      color: var(--gray);
      padding: 0 0;
    }

    /* ── TABLE SECTION ── */
    .table-section {
      max-width: 1100px;
      margin: 1.5rem auto;
      padding: 0 1.5rem;
    }

    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--card);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: rgba(74,144,212,0.06);
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 0.75rem 1rem;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray);
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
      transition: color 0.2s;
    }
    th:hover { color: var(--text); }
    th .sort-icon { margin-left: 0.3rem; opacity: 0.4; }
    th.sort-asc .sort-icon::after { content: ' ↑'; opacity: 1; }
    th.sort-desc .sort-icon::after { content: ' ↓'; opacity: 1; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(74,144,212,0.06); }

    td {
      padding: 0.85rem 1rem;
      font-size: 0.85rem;
      vertical-align: middle;
    }

    .rank-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: var(--gray);
      text-align: center;
    }

    .rank-badge {
      display: inline-block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      border: 1px solid currentColor;
      min-width: 2.8rem;
      text-align: center;
    }

    .name-block { display: flex; flex-direction: column; gap: 0.15rem; }
    .name-ja {
      font-family: 'Noto Serif JP', serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }
    .name-reading {
      font-size: 0.68rem;
      color: var(--gray);
      letter-spacing: 0.06em;
    }

    .party-badge {
      display: inline-block;
      padding: 0.18rem 0.55rem;
      border-radius: 3px;
      font-size: 0.72rem;
      font-family: 'Noto Serif JP', serif;
      font-weight: 400;
      white-space: nowrap;
      color: #fff;
    }

    .chamber-text {
      font-size: 0.78rem;
      color: var(--gray);
    }
    .district-text {
      font-size: 0.68rem;
      color: rgba(104,120,160,0.7);
      margin-top: 0.1rem;
    }

    .score-cell { min-width: 110px; }
    .score-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }
    .score-bar-wrap {
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      margin-top: 0.35rem;
      width: 80px;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--blue), var(--green));
    }

    .flags-cell { text-align: center; }
    .flag-icon { font-size: 1rem; }

    .detail-btn {
      display: inline-block;
      padding: 0.35rem 0.9rem;
      border: 1px solid var(--border-h);
      border-radius: 5px;
      font-size: 0.72rem;
      color: var(--blue);
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .detail-btn:hover {
      background: rgba(74,143,212,0.12);
      border-color: var(--blue);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--gray);
    }
    .empty-state p { font-size: 0.9rem; margin-top: 0.5rem; }

    /* ── FOOTER ── */
    .site-footer {
      margin-top: 4rem;
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      font-size: 0.72rem;
      color: var(--gray);
      letter-spacing: 0.1em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .site-header { padding: 0 1rem; }
      .hero { padding: 2.5rem 1rem 2rem; }
      .filter-bar { padding: 0.75rem 1rem; }
      .table-section { padding: 0 0.75rem; }
      td, th { padding: 0.6rem 0.6rem; }
      .th-chamber, .td-chamber { display: none; }
      .th-flags { display: none; }
      .td-flags { display: none; }
      .stats-grid { gap: 1.2rem; }
    }
    @media (max-width: 540px) {
      .th-rank-badge, .td-rank-badge { display: none; }
    }
  </style>
</head>

<!-- TABLE -->
<main class="table-section">

          <th data-col="flags" class="th-flags">フラグ</th>
          <th></th>

      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="empty-state" id="empty-state" style="display:none">
      <div style="font-size:2rem">🔍</div>
      <p>該当する政治家が見つかりませんでした</p>
    </div>
  </div>
</main>

<!-- FOOTER -->
<footer class="site-footer">
  © 2026 統覧 TORAN | Ryuzaburo — このサイトは教育・情報目的のプロトタイプです

/* ── HELPERS ── */
function rankColor(rank) {
  if(rank.startsWith('S')) return '#f5c842';
  if(rank.startsWith('A')) return '#4ac776';
  if(rank.startsWith('B')) return '#4a8fd4';
  if(rank.startsWith('C')) return '#f0a030';
  return '#e6384f';
}

function partyBadge(party) {
  const color = PARTY_COLORS[party] || '#555';
  return `<span class="party-badge" style="background:${color}">${party}</span>`;
}

  filtered = POLITICIANS.filter(p => {
    if(q && !p.name.includes(filters.search) && !p.reading.includes(q) && !p.party.includes(q) && !p.role.includes(q)) return false;
    if(filters.chamber && p.chamber !== filters.chamber) return false;
    if(filters.party && p.party !== filters.party) return false;
    if(filters.rank && !p.rank.startsWith(filters.rank)) return false;
    if(filters.caution && !p.flag_caution && !p.flag_crime) return false;
    return true;
  });
  applySort();
  render();
}

function applySort() {
  filtered.sort((a,b) => {
    let av, bv;
    switch(sortCol) {
      case 'total': av=a.total; bv=b.total; break;
      case 'name': av=a.name; bv=b.name; break;
      case 'party': av=a.party; bv=b.party; break;
      case 'chamber': av=a.chamber; bv=b.chamber; break;
      case 'rank-badge': av=a.rank; bv=b.rank; break;
      default: av=a.total; bv=b.total;
    }
    if(av < bv) return sortDir==='asc' ? -1 : 1;
    if(av > bv) return sortDir==='asc' ? 1 : -1;
    return 0;
  });
}

function render() {
  const tbody = document.getElementById('table-body');
  const empty = document.getElementById('empty-state');
  const count = document.getElementById('result-count');

  // Rank by total desc (original rank order)
  const sorted_by_total = [...POLITICIANS].sort((a,b) => b.total - a.total);
  const rankMap = {};
  sorted_by_total.forEach((p,i) => rankMap[p.id] = i+1);

  count.textContent = `${filtered.length} 人 / 全 ${POLITICIANS.length} 人`;

  if(filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(p => {
    const rc = rankColor(p.rank);
    const barW = Math.round(p.total);
    const flags = [
      p.flag_crime ? '<span class="flag-icon" title="犯罪・違反">🚨</span>' : '',
      p.flag_caution ? '<span class="flag-icon" title="要注意">⚠️</span>' : ''
    ].join('');

    return `<tr onclick="window.location='politician.html?id=${p.id}'">
      <td class="rank-num">${rankMap[p.id]}</td>
      <td class="td-rank-badge"><span class="rank-badge" style="color:${rc};border-color:${rc}20;background:${rc}12">${p.rank}</span></td>
      <td>
        <div class="name-block">
          <div class="name-ja">${p.name}</div>
          <div class="name-reading">${p.reading}</div>
        </div>
      </td>
      <td>${partyBadge(p.party)}</td>
      <td class="td-chamber">
        <div class="chamber-text">${p.chamber}</div>
        <div class="district-text">${p.district}</div>
      </td>
      <td class="score-cell">
        <div class="score-num">${p.total}</div>
        <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${barW}%"></div></div>
      </td>
      <td class="flags-cell td-flags">${flags || '<span style="color:var(--gray);font-size:0.7rem">—</span>'}</td>
      <td><a class="detail-btn" href="politician.html?id=${p.id}" onclick="event.stopPropagation()">詳細 →</a></td>
    </tr>`;
  }).join('');

  // Update sort indicators
  document.querySelectorAll('th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    if(th.dataset.col === sortCol) th.classList.add(sortDir==='asc'?'sort-asc':'sort-desc');
  });
}

/* ── EVENT LISTENERS ── */
document.getElementById('search').addEventListener('input', e => {
  filters.search = e.target.value;
  applyFilters();
});
document.getElementById('filter-chamber').addEventListener('change', e => {
  filters.chamber = e.target.value;
  applyFilters();
});
document.getElementById('filter-party').addEventListener('change', e => {
  filters.party = e.target.value;
  applyFilters();
});
document.getElementById('filter-rank').addEventListener('change', e => {
  filters.rank = e.target.value;
  applyFilters();
});
document.getElementById('toggle-caution').addEventListener('click', function() {
  filters.caution = !filters.caution;
  this.classList.toggle('active', filters.caution);
  applyFilters();
});

document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    if(sortCol === th.dataset.col) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortCol = th.dataset.col;
      sortDir = sortCol === 'total' ? 'desc' : 'asc';
    }
    applySort();
    render();
  });
});

/* ── INIT ── */
updateStats();
applyFilters();
</script>
</body>
</html>
