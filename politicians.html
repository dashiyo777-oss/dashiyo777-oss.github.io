<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>統覧 TORAN — 政治家ランキング</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500;600&family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #0d1525;
      --card:     #162040;
      --mid:      #1c2a4a;
      --red:      #e6384f;
      --blue:     #5ba0e0;
      --gold:     #f5c842;
      --green:    #4ac776;
      --orange:   #f0a030;
      --text:     #e8edf8;
      --gray:     #8090b8;
      --border:   rgba(74,144,226,0.20);
      --border-h: rgba(74,144,226,0.40);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', 'Noto Serif JP', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,21,37,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      text-decoration: none;
    }
    .logo-ja {
      font-family: 'Noto Serif JP', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.12em;
    }
    .logo-en {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--gray);
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .nav-link {
      font-size: 0.75rem;
      color: var(--gray);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--text); }
    .nav-link.back::before { content: '← '; }

    /* ── HERO ── */
    .hero {
      padding: 4rem 2rem 3rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(74,143,212,0.10) 0%, transparent 100%);
    }
    .hero-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      color: var(--blue);
      text-transform: uppercase;
      margin-bottom: 1rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
    }
    .hero-title {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }
    .hero-title span {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--blue);
      font-size: 1.1em;
    }
    .hero-tagline {
      font-size: 0.85rem;
      color: var(--gray);
      letter-spacing: 0.08em;
      margin-bottom: 2.5rem;
      font-family: 'Noto Serif JP', serif;
    }

    .stats-grid {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .stat-item {
      text-align: center;
    }
    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }
    .stat-num.blue { color: var(--blue); }
    .stat-num.green { color: var(--green); }
    .stat-num.orange { color: var(--orange); }
    .stat-num.gold { color: var(--gold); }
    .stat-label {
      font-size: 0.7rem;
      color: var(--gray);
      letter-spacing: 0.08em;
      margin-top: 0.25rem;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      position: sticky;
      top: 60px;
      z-index: 90;
      background: rgba(22,32,64,0.98);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 2rem;
    }

    .filter-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 180px;
    }
    .search-icon {
      position: absolute;
      left: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      font-size: 0.85rem;
      pointer-events: none;
    }
    .filter-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem 0.5rem 2.1rem;
      color: var(--text);
      font-size: 0.82rem;
      font-family: 'Noto Serif JP', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .filter-input:focus { border-color: var(--blue); }
    .filter-input::placeholder { color: var(--gray); }

    .filter-select {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      color: var(--text);
      font-size: 0.8rem;
      font-family: 'Noto Serif JP', sans-serif;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .filter-select:focus { border-color: var(--blue); }
    .filter-select option { background: #1c2a4a; }

    .filter-toggle {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--gray);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-toggle.active {
      border-color: var(--orange);
      color: var(--orange);
      background: rgba(240,160,48,0.08);
    }

    .result-count {
      max-width: 1100px;
      margin: 0.6rem auto 0;
      font-size: 0.75rem;
      color: var(--gray);
      padding: 0 0;
    }

    /* ── TABLE SECTION ── */
    .table-section {
      max-width: 1100px;
      margin: 1.5rem auto;
      padding: 0 1.5rem;
    }

    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--card);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: rgba(74,144,212,0.12);
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 0.75rem 1rem;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray);
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
      transition: color 0.2s;
    }
    th:hover { color: var(--text); }
    th .sort-icon { margin-left: 0.3rem; opacity: 0.4; }
    th.sort-asc .sort-icon::after { content: ' ↑'; opacity: 1; }
    th.sort-desc .sort-icon::after { content: ' ↓'; opacity: 1; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(74,144,212,0.06); }

    td {
      padding: 0.85rem 1rem;
      font-size: 0.85rem;
      vertical-align: middle;
    }

    .rank-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: var(--gray);
      text-align: center;
    }

    .rank-badge {
      display: inline-block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      border: 1px solid currentColor;
      min-width: 2.8rem;
      text-align: center;
    }

    .name-block { display: flex; flex-direction: column; gap: 0.15rem; }
    .name-ja {
      font-family: 'Noto Serif JP', serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }
    .name-reading {
      font-size: 0.68rem;
      color: var(--gray);
      letter-spacing: 0.06em;
    }

    .party-badge {
      display: inline-block;
      padding: 0.18rem 0.55rem;
      border-radius: 3px;
      font-size: 0.72rem;
      font-family: 'Noto Serif JP', serif;
      font-weight: 400;
      white-space: nowrap;
      color: #fff;
    }

    .chamber-text {
      font-size: 0.78rem;
      color: var(--gray);
    }
    .district-text {
      font-size: 0.68rem;
      color: rgba(128,144,184,0.85);
      margin-top: 0.1rem;
    }

    .score-cell { min-width: 110px; }
    .score-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }
    .score-bar-wrap {
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      margin-top: 0.35rem;
      width: 80px;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--blue), var(--green));
    }

    .flags-cell { text-align: center; }
    .flag-icon { font-size: 1rem; }

    .detail-btn {
      display: inline-block;
      padding: 0.35rem 0.9rem;
      border: 1px solid var(--border-h);
      border-radius: 5px;
      font-size: 0.72rem;
      color: var(--blue);
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .detail-btn:hover {
      background: rgba(74,143,212,0.12);
      border-color: var(--blue);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--gray);
    }
    .empty-state p { font-size: 0.9rem; margin-top: 0.5rem; }

    /* ── FOOTER ── */
    .site-footer {
      margin-top: 4rem;
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      font-size: 0.72rem;
      color: var(--gray);
      letter-spacing: 0.1em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .site-header { padding: 0 1rem; }
      .hero { padding: 2.5rem 1rem 2rem; }
      .filter-bar { padding: 0.75rem 1rem; }
      .table-section { padding: 0 0.75rem; }
      td, th { padding: 0.6rem 0.6rem; }
      .th-chamber, .td-chamber { display: none; }
      .th-flags { display: none; }
      .td-flags { display: none; }
      .stats-grid { gap: 1.2rem; }
    }
    @media (max-width: 540px) {
      .th-rank-badge, .td-rank-badge { display: none; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <a class="logo" href="politicians.html">
    <span class="logo-ja">統覧</span>
    <span class="logo-en">TORAN</span>
  </a>
  <nav class="header-nav">

<!-- HERO -->
<section class="hero">

  <h1 class="hero-title">政治家 <span>総覧</span></h1>
  <p class="hero-tagline">812人の政治家データベース — 実績・発言・疑惑を根拠に基づき評価する</p>
  <div class="stats-grid">

      <option value="公明党">公明党</option>

<!-- TABLE -->

      <thead>

          <th data-col="rank" class="th-ranknum">#<span class="sort-icon"></span></th>

      </thead>
      <tbody id="table-body"></tbody>

    <div class="empty-state" id="empty-state" style="display:none">

</main>

<!-- FOOTER -->
<footer class="site-footer">
  © 2026 統覧 TORAN | Ryuzaburo — このサイトは教育・情報目的のプロトタイプです

<script src="data.js"></script>
<script>
/* ── DATA ── */
const AXES_JA = ['国民生活改善','経済・財政','安全保障','政策実現力','説明責任','長期国益','公共性','政治倫理'];
const STANCE_ITEMS = [
  {key:'tax_cut',label:'減税'},{key:'active_fiscal',label:'積極財政'},{key:'discipline',label:'財政規律'},
  {key:'defense',label:'防衛強化'},{key:'econ_sec',label:'経済安保'},{key:'immigration',label:'移民拡大'},
  {key:'renewable',label:'再エネ推進'},{key:'nuclear',label:'原発活用'},{key:'expo',label:'万博推進'},
  {key:'ir',label:'IR推進'},{key:'mynumber',label:'マイナ推進'},{key:'birthrate',label:'少子化対策'},
  {key:'education',label:'教育投資'},{key:'regional',label:'地方創生'},{key:'china',label:'対中依存削減'},
  {key:'foreign',label:'外国人政策'},{key:'food',label:'食料安保'},{key:'semi',label:'半導体支援'}
];

const PARTY_COLORS = {
  '自民党':'#c8102e','立憲民主党':'#003f8a','日本維新の会':'#f2a100',
  '公明党':'#9b59b6','国民民主党':'#7ac143','日本共産党':'#e4002b',
  'れいわ新選組':'#ff69b4','参政党':'#ff8c00','無所属':'#808080'
};



/* ── HELPERS ── */
function rankColor(rank) {
  if(rank.startsWith('S')) return '#f5c842';
  if(rank.startsWith('A')) return '#4ac776';
  if(rank.startsWith('B')) return '#4a8fd4';
  if(rank.startsWith('C')) return '#f0a030';
  return '#e6384f';
}

function partyBadge(party) {
  const color = PARTY_COLORS[party] || '#555';
  return `<span class="party-badge" style="background:${color}">${party}</span>`;
}

/* ── STATE ── */
let sortCol = 'total';
let sortDir = 'desc';
let filters = { search:'', chamber:'', party:'', rank:'', caution: false };
let filtered = [...POLITICIANS];

/* ── STATS ── */
function updateStats() {
  document.getElementById('stat-surveyed').textContent = POLITICIANS.filter(p=>p.survey==='調査済').length + '人';
  document.getElementById('stat-a-plus').textContent = POLITICIANS.filter(p=>p.rank.startsWith('A')||p.rank.startsWith('S')).length + '人';
  document.getElementById('stat-caution').textContent = POLITICIANS.filter(p=>p.flag_caution||p.flag_crime).length + '人';
  document.getElementById('stat-evidence').textContent = EVIDENCE.length + '件';
}

/* ── RENDER ── */
function applyFilters() {
  const q = filters.search.toLowerCase();
  filtered = POLITICIANS.filter(p => {
    if(q && !p.name.includes(filters.search) && !p.reading.includes(q) && !p.party.includes(q) && !p.role.includes(q)) return false;
    if(filters.chamber && p.chamber !== filters.chamber) return false;
    if(filters.party && p.party !== filters.party) return false;
    if(filters.rank && !p.rank.startsWith(filters.rank)) return false;
    if(filters.caution && !p.flag_caution && !p.flag_crime) return false;
    return true;
  });
  applySort();
  render();
}

function applySort() {
  filtered.sort((a,b) => {
    let av, bv;
    switch(sortCol) {
      case 'total': av=a.total; bv=b.total; break;
      case 'name': av=a.name; bv=b.name; break;
      case 'party': av=a.party; bv=b.party; break;
      case 'chamber': av=a.chamber; bv=b.chamber; break;
      case 'rank-badge': av=a.rank; bv=b.rank; break;
      default: av=a.total; bv=b.total;
    }
    if(av < bv) return sortDir==='asc' ? -1 : 1;
    if(av > bv) return sortDir==='asc' ? 1 : -1;
    return 0;
  });
}

function render() {
  const tbody = document.getElementById('table-body');
  const empty = document.getElementById('empty-state');
  const count = document.getElementById('result-count');

  // Rank by total desc (original rank order)
  const sorted_by_total = [...POLITICIANS].sort((a,b) => b.total - a.total);
  const rankMap = {};
  sorted_by_total.forEach((p,i) => rankMap[p.id] = i+1);

  count.textContent = `${filtered.length} 人 / 全 ${POLITICIANS.length} 人`;

  if(filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(p => {
    const rc = rankColor(p.rank);
    const barW = Math.round(p.total);
    const flags = [
      p.flag_crime ? '<span class="flag-icon" title="犯罪・違反">🚨</span>' : '',
      p.flag_caution ? '<span class="flag-icon" title="要注意">⚠️</span>' : ''
    ].join('');

    return `<tr onclick="window.location='politician.html?id=${p.id}'">
      <td class="rank-num">${rankMap[p.id]}</td>
      <td class="td-rank-badge"><span class="rank-badge" style="color:${rc};border-color:${rc}20;background:${rc}12">${p.rank}</span></td>
      <td>
        <div class="name-block">
          <div class="name-ja">${p.name}</div>
          <div class="name-reading">${p.reading}</div>
        </div>
      </td>
      <td>${partyBadge(p.party)}</td>
      <td class="td-chamber">
        <div class="chamber-text">${p.chamber}</div>
        <div class="district-text">${p.district}</div>
      </td>
      <td class="score-cell">
        <div class="score-num">${p.total}</div>
        <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${barW}%"></div></div>
      </td>
      <td class="flags-cell td-flags">${flags || '<span style="color:var(--gray);font-size:0.7rem">—</span>'}</td>
      <td><a class="detail-btn" href="politician.html?id=${p.id}" onclick="event.stopPropagation()">詳細 →</a></td>
    </tr>`;
  }).join('');

  // Update sort indicators
  document.querySelectorAll('th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    if(th.dataset.col === sortCol) th.classList.add(sortDir==='asc'?'sort-asc':'sort-desc');
  });
}

/* ── EVENT LISTENERS ── */
document.getElementById('search').addEventListener('input', e => {
  filters.search = e.target.value;
  applyFilters();
});
document.getElementById('filter-chamber').addEventListener('change', e => {
  filters.chamber = e.target.value;
  applyFilters();
});
document.getElementById('filter-party').addEventListener('change', e => {
  filters.party = e.target.value;
  applyFilters();
});
document.getElementById('filter-rank').addEventListener('change', e => {
  filters.rank = e.target.value;
  applyFilters();
});
document.getElementById('toggle-caution').addEventListener('click', function() {
  filters.caution = !filters.caution;
  this.classList.toggle('active', filters.caution);
  applyFilters();
});

document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    if(sortCol === th.dataset.col) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortCol = th.dataset.col;
      sortDir = sortCol === 'total' ? 'desc' : 'asc';
    }
    applySort();
    render();
  });
});

/* ── INIT ── */
updateStats();
applyFilters();
</script>
</body>
</html>
