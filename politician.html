<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500;600&family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  /* !! EXTRA STYLES FOR PROFILE PAGE v2 !! */
  .profile-hero-card {

    padding: 2.5rem 2rem 2rem;
  }
  .profile-hero-inner {
    max-width: 1100px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr auto; gap: 2rem; align-items: start;
  }
  .hero-rank-row {
    display: flex; align-items: center; gap: 0.9rem; margin-bottom: 0.8rem; flex-wrap: wrap;
  }
  .hero-rank-box {
    font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 600;
    padding: 0.15rem 0.65rem; border-radius: 5px; border: 2px solid currentColor;
    line-height: 1.3;
  }
  .hero-party-badge {
    display: inline-block; padding: 0.2rem 0.65rem; border-radius: 4px;
    font-size: 0.78rem; font-family: 'Noto Serif JP', serif; font-weight: 400; color: #fff;
  }
  .hero-flag-pill {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.15rem 0.65rem; border-radius: 50px; font-size: 0.65rem; font-weight: 500;
  }
  .hero-flag-pill.crime { background: rgba(230,56,79,0.15); border: 1px solid rgba(230,56,79,0.4); color: var(--red); }
  .hero-flag-pill.caution { background: rgba(240,160,48,0.12); border: 1px solid rgba(240,160,48,0.35); color: var(--orange); }
  .hero-name-ja {
    font-family: 'Noto Serif JP', serif; font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 600; color: var(--text); letter-spacing: 0.08em; line-height: 1.15; margin-bottom: 0.25rem;
  }
  .hero-reading { font-size: 0.78rem; color: var(--gray); letter-spacing: 0.12em; margin-bottom: 0.4rem; font-family: 'Noto Serif JP', serif; }
  .hero-role { font-size: 0.85rem; color: var(--blue); letter-spacing: 0.06em; margin-bottom: 0.9rem; font-family: 'Noto Serif JP', serif; }
  .hero-meta-pills { display: flex; gap: 0.45rem; flex-wrap: wrap; margin-bottom: 0.9rem; }
  .meta-pill { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.7rem; border: 1px solid var(--border); color: var(--gray); }
  .hero-links { display: flex; gap: 0.45rem; flex-wrap: wrap; }
  .hero-link { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.25rem 0.65rem; border: 1px solid var(--border); border-radius: 4px; font-size: 0.68rem; color: var(--gray); text-decoration: none; transition: all 0.2s; }
  .hero-link:hover { border-color: var(--blue); color: var(--blue); }
  .hero-score-block { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 0.3rem; }
  .hero-score-label { font-size: 0.6rem; color: var(--gray); letter-spacing: 0.15em; text-transform: uppercase; }
  .hero-score-num { font-family: 'Cormorant Garamond', serif; font-size: 4.5rem; font-weight: 600; line-height: 1; }
  .hero-score-max { font-size: 0.75rem; color: var(--gray); }
  .hero-updated { font-size: 0.62rem; color: var(--gray); margin-top: 0.4rem; }
  .nav-prev-next { max-width: 1100px; margin: 0 auto 1.5rem; padding: 0 2rem; display: flex; justify-content: space-between; gap: 1rem; }
  .nav-prev-btn, .nav-next-btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 5px; text-decoration: none; color: var(--gray); font-size: 0.72rem; font-family: 'Noto Serif JP', sans-serif; transition: all 0.2s; }
  .nav-prev-btn:hover, .nav-next-btn:hover { border-color: var(--blue); color: var(--blue); }
  .nav-prev-btn.off, .nav-next-btn.off { opacity: 0.3; pointer-events: none; }
  .nav-btn-name { font-family: 'Noto Serif JP', serif; color: var(--text); font-size: 0.8rem; }
  @media (max-width: 768px) {
    .profile-hero-inner { grid-template-columns: 1fr; }
    .hero-score-block { text-align: left; align-items: flex-start; flex-direction: row; align-items: center; gap: 1rem; }
    .hero-score-num { font-size: 2.8rem; }
    .nav-prev-next { padding: 0 1rem; }
  }
</style>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:     #0d1525;
    --card:   #162040;
    --mid:    #1c2a4a;
    --red:    #e6384f;
    --blue:   #5ba0e0;
    --gold:   #f5c842;
    --green:  #4ac776;
    --orange: #f0a030;
    --text:   #e8edf8;
    --gray:   #8090b8;
    --border: rgba(74,144,226,0.20);
    --border-h: rgba(74,144,226,0.40);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', 'Noto Serif JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .site-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,21,37,0.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .logo {
    display: flex; align-items: baseline; gap: 0.6rem; text-decoration: none;
  }
  .logo-ja { font-family: 'Noto Serif JP', serif; font-size: 1.2rem; font-weight: 600; color: var(--text); letter-spacing: 0.12em; }
  .logo-en { font-family: 'Cormorant Garamond', serif; font-size: 0.85rem; font-weight: 300; color: var(--gray); letter-spacing: 0.25em; text-transform: uppercase; }

  .header-nav { display: flex; align-items: center; gap: 1.5rem; }
  .nav-link { font-size: 0.72rem; color: var(--gray); text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; }
  .nav-link:hover { color: var(--text); }
  .nav-link.back::before { content: '← '; }

  /* ── PROFILE HERO ── */
  .profile-hero {
    background: linear-gradient(135deg, #101d38 0%, #162540 60%, #0d1830 100%);
    border-bottom: 1px solid var(--border);
    padding: 3rem 2rem 2rem;
    position: relative; overflow: hidden;
  }

  .profile-hero::before {
    content: ''; position: absolute; top: -80px; right: -80px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(74,143,212,0.14) 0%, transparent 70%);
    pointer-events: none;
  }

  .profile-inner {
    max-width: 1100px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr auto; gap: 2rem; align-items: start;
  }

  .profile-left {}

  .profile-rank-row {
    display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;
  }

  .rank-num-large {
    font-family: 'Cormorant Garamond', serif; font-size: 0.9rem; color: var(--gray); letter-spacing: 0.15em;
  }

  .rank-badge-large {
    font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 600;
    padding: 0.2rem 0.7rem; border-radius: 5px; border: 1px solid currentColor;
  }

  .party-badge {
    display: inline-block; padding: 0.2rem 0.65rem; border-radius: 4px;
    font-size: 0.75rem; font-family: 'Noto Serif JP', serif; font-weight: 400; color: #fff;
  }

  .profile-name-ja {
    font-family: 'Noto Serif JP', serif; font-size: 2.4rem; font-weight: 600;
    color: var(--text); letter-spacing: 0.1em; line-height: 1.1; margin-bottom: 0.3rem;
  }

  .profile-reading {
    font-size: 0.82rem; color: var(--gray); letter-spacing: 0.12em; margin-bottom: 0.5rem;
  }

  .profile-role {
    font-size: 0.88rem; color: var(--blue); letter-spacing: 0.08em; margin-bottom: 1rem;
    font-family: 'Noto Serif JP', serif;
  }

  .profile-meta-row {
    display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 1.2rem;
  }

  .profile-meta-item { display: flex; flex-direction: column; gap: 0.1rem; }
  .meta-label { font-size: 0.55rem; color: var(--gray); letter-spacing: 0.15em; text-transform: uppercase; }
  .meta-value { font-size: 0.78rem; color: var(--text); letter-spacing: 0.06em; }

  .flag-row { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.5rem; }

  .flag-pill {
    display: inline-flex; align-items: center; gap: 0.35rem;
    border-radius: 50px; padding: 0.2rem 0.7rem;
    font-size: 0.62rem; letter-spacing: 0.08em; font-family: 'Montserrat', sans-serif;
  }

  .flag-crime { background: rgba(230,56,79,0.15); border: 1px solid rgba(230,56,79,0.4); color: var(--red); }
  .flag-caution { background: rgba(240,160,48,0.12); border: 1px solid rgba(240,160,48,0.35); color: var(--orange); }
  .flag-clean { background: rgba(74,199,118,0.1); border: 1px solid rgba(74,199,118,0.3); color: var(--green); }

  /* Score display (right side) */
  .profile-score-box {
    text-align: center;
    background: var(--card);
    border: 1px solid var(--border-h);
    border-radius: 12px;
    padding: 1.5rem 2rem;
    min-width: 140px;
  }

  .score-total-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3.5rem; font-weight: 600; line-height: 1; margin-bottom: 0.2rem;
  }

  .score-total-label { font-size: 0.55rem; color: var(--gray); letter-spacing: 0.15em; margin-bottom: 1rem; }

  .score-grade {
    font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 600;
    padding: 0.2rem 0.8rem; border-radius: 6px; border: 1px solid currentColor; display: inline-block;
  }

  .updated-label { font-size: 0.52rem; color: var(--gray); letter-spacing: 0.1em; margin-top: 0.7rem; }

  /* ── MAIN LAYOUT ── */
  .main-grid {
    max-width: 1100px; margin: 2rem auto; padding: 0 2rem;
    display: grid; grid-template-columns: 1fr 360px; gap: 1.5rem;
  }

  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
    .profile-inner { grid-template-columns: 1fr; }
    .profile-score-box { max-width: 200px; }
  }

  /* ── SECTION CARD ── */
  .section-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 1.5rem;
    overflow: hidden;
  }

  .section-head {
    padding: 0.9rem 1.3rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 0.6rem;
  }

  .section-head-icon { font-size: 0.9rem; }

  .section-head-title {
    font-size: 0.65rem; letter-spacing: 0.2em; color: var(--gray);
    text-transform: uppercase; font-family: 'Montserrat', sans-serif; font-weight: 500;
  }

  .section-body { padding: 1.3rem; }

  /* ── RADAR CHART ── */
  .radar-wrap { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  .radar-svg { display: block; }

  .axes-legend {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem 1rem; width: 100%;
  }

  .axis-item {
    display: flex; align-items: center; gap: 0.4rem; font-size: 0.6rem; color: var(--gray);
  }

  .axis-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--blue); flex-shrink: 0;
  }

  .axis-score { margin-left: auto; font-family: 'Montserrat', sans-serif; font-weight: 500; color: var(--text); }

  /* ── COMMENT ── */
  .comment-text {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.82rem; line-height: 1.9; color: var(--text);
  }

  .plus-minus-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-top: 1rem; }

  .plus-box, .minus-box {
    padding: 0.8rem 1rem; border-radius: 7px;
    font-size: 0.72rem; font-family: 'Noto Serif JP', serif; line-height: 1.7;
  }

  .plus-box { background: rgba(74,199,118,0.12); border: 1px solid rgba(74,199,118,0.35); }
  .plus-box .pm-label { color: var(--green); font-size: 0.58rem; letter-spacing: 0.12em; margin-bottom: 0.3rem; }

  .minus-box { background: rgba(230,56,79,0.12); border: 1px solid rgba(230,56,79,0.35); }
  .minus-box .pm-label { color: var(--red); font-size: 0.58rem; letter-spacing: 0.12em; margin-bottom: 0.3rem; }

  /* ── STANCE GRID ── */
  .stance-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }

  .stance-item {
    display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
    background: var(--mid); border: 1px solid var(--border); border-radius: 6px;
    padding: 0.5rem 0.3rem; text-align: center;
  }

  .stance-label { font-size: 0.55rem; color: var(--gray); letter-spacing: 0.06em; font-family: 'Noto Serif JP', serif; }
  .stance-mark { font-size: 0.9rem; font-weight: 600; font-family: 'Montserrat', sans-serif; }
  .mark-dbl-circle { color: var(--green); }
  .mark-circle { color: #5ab8e0; }
  .mark-triangle { color: var(--orange); }
  .mark-cross { color: var(--red); }

  /* ── EVIDENCE TABS ── */
  .tab-row {
    display: flex; border-bottom: 1px solid var(--border); padding: 0 1.3rem;
    gap: 0; overflow-x: auto;
  }

  .tab-btn {
    padding: 0.7rem 1rem; font-size: 0.62rem; letter-spacing: 0.1em; color: var(--gray);
    background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer;
    transition: all 0.2s; white-space: nowrap; font-family: 'Montserrat', sans-serif;
    margin-bottom: -1px;
  }

  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

  .tab-content { display: none; padding: 1.3rem; }
  .tab-content.active { display: block; }

  /* Evidence cards */
  .ev-card {
    border-radius: 7px; padding: 0.9rem 1rem; margin-bottom: 0.7rem;
    border-left: 3px solid; position: relative;
  }

  .ev-card:last-child { margin-bottom: 0; }

  .ev-card.cat-crime { background: rgba(230,56,79,0.13); border-color: var(--red); }
  .ev-card.cat-problem { background: rgba(240,160,48,0.11); border-color: var(--orange); }
  .ev-card.cat-achievement { background: rgba(74,199,118,0.11); border-color: var(--green); }
  .ev-card.cat-statement { background: rgba(91,160,224,0.11); border-color: var(--blue); }

  .ev-icon { font-size: 0.85rem; margin-right: 0.4rem; }

  .ev-summary {
    font-family: 'Noto Serif JP', serif; font-size: 0.82rem; font-weight: 600;
    color: var(--text); margin-bottom: 0.4rem; line-height: 1.5;
  }

  .ev-detail {
    font-family: 'Noto Serif JP', serif; font-size: 0.72rem; color: rgba(221,227,240,0.75);
    line-height: 1.8;
  }

  .ev-meta {
    display: flex; gap: 0.8rem; margin-top: 0.5rem; flex-wrap: wrap;
  }

  .ev-meta span { font-size: 0.55rem; color: var(--gray); letter-spacing: 0.08em; }

  .ev-empty {
    text-align: center; padding: 2rem; color: var(--gray);
    font-size: 0.72rem; letter-spacing: 0.1em;
  }

  /* ── LINKS ── */
  .links-grid { display: flex; gap: 0.6rem; flex-wrap: wrap; }
  .link-btn {
    display: inline-flex; align-items: center; gap: 0.35rem;
    padding: 0.4rem 0.85rem; border-radius: 5px; font-size: 0.65rem;
    text-decoration: none; letter-spacing: 0.08em;
    border: 1px solid var(--border-h); color: var(--gray); transition: all 0.2s;
  }
  .link-btn:hover { border-color: var(--blue); color: var(--blue); }

  /* ── SCORE AXES TABLE ── */
  .axes-table { width: 100%; border-collapse: collapse; }
  .axes-table td { padding: 0.45rem 0; }
  .ax-name { font-size: 0.68rem; color: var(--gray); letter-spacing: 0.05em; font-family: 'Noto Serif JP', serif; width: 100px; }
  .ax-bar-wrap { padding: 0 0.6rem; }
  .ax-bar-bg { height: 5px; background: rgba(255,255,255,0.12); border-radius: 3px; }
  .ax-bar-fill { height: 100%; border-radius: 3px; background: var(--blue); }
  .ax-val { font-family: 'Montserrat', sans-serif; font-size: 0.72rem; font-weight: 500; min-width: 20px; text-align: right; }

  /* ── FOOTER ── */
  .site-footer {
    margin-top: 3rem; border-top: 1px solid var(--border);
    padding: 2rem; text-align: center;
    font-size: 0.65rem; color: var(--gray); letter-spacing: 0.1em;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .site-header { padding: 0 1rem; }
    .profile-hero { padding: 2rem 1rem 1.5rem; }
    .main-grid { padding: 0 1rem; }
    .profile-name-ja { font-size: 1.8rem; }
    .stance-grid { grid-template-columns: repeat(3, 1fr); }
    .plus-minus-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

  <a class="logo" href="politicians.html">

  </div>
</div>

<footer class="site-footer" id="site-footer">
  © 2026 統覧 TORAN | Ryuzaburo — このサイトは教育・情報目的のプロトタイプです

<script>
/* ── SHARED DATA ── */
const AXES_JA = ['国民生活改善','経済・財政','安全保障','政策実現力','説明責任','長期国益','公共性','政治倫理'];

const STANCE_ITEMS = [
  {key:'tax_cut',label:'減税'},{key:'active_fiscal',label:'積極財政'},{key:'discipline',label:'財政規律'},
  {key:'defense',label:'防衛強化'},{key:'econ_sec',label:'経済安保'},{key:'immigration',label:'移民拡大'},

/* ── HELPERS ── */
function rankColor(rank) {
  if (!rank) return '#6878a0';
  if (rank.startsWith('S')) return '#f5c842';
  if (rank.startsWith('A')) return '#4ac776';
  if (rank.startsWith('B')) return '#4a8fd4';
  if (rank.startsWith('C')) return '#f0a030';
  return '#e6384f';
}

function scoreColor(total) {
  if (total >= 75) return '#4ac776';
  if (total >= 60) return '#4a8fd4';
  if (total >= 45) return '#f5c842';
  return '#e6384f';
}

function markClass(m) {
  if (m === '◎') return 'mark-dbl-circle';
  if (m === '○') return 'mark-circle';
  if (m === '△') return 'mark-triangle';
  if (m === '×') return 'mark-cross';
  return '';
}

/* ── RADAR CHART ── */
function buildRadar(axes, container) {
  const cx = 140, cy = 140, r = 100;
  const n = 8;
  const max = 5;
  const angleStep = (Math.PI * 2) / n;
  const startAngle = -Math.PI / 2;

  function polarToCart(i, val) {
    const a = startAngle + i * angleStep;
    const rv = (val / max) * r;
    return { x: cx + rv * Math.cos(a), y: cy + rv * Math.sin(a) };
  }

  let svg = '';

  // Grid rings
  [1,2,3,4,5].forEach(ring => {
    const pts = Array.from({length:n}, (_,i) => {
      const a = startAngle + i * angleStep;
      const rv = (ring / max) * r;
      return `${cx + rv * Math.cos(a)},${cy + rv * Math.sin(a)}`;
    }).join(' ');
    svg += `<polygon points="${pts}" fill="none" stroke="rgba(74,144,226,0.1)" stroke-width="1"/>`;
  });

  // Axis lines
  for (let i = 0; i < n; i++) {
    const pt = polarToCart(i, max);
    svg += `<line x1="${cx}" y1="${cy}" x2="${pt.x}" y2="${pt.y}" stroke="rgba(74,144,226,0.15)" stroke-width="1"/>`;
  }

  // Data polygon
  const dataPts = axes.map((v, i) => {
    const p = polarToCart(i, Math.min(v, max));
    return `${p.x},${p.y}`;
  }).join(' ');
  svg += `<polygon points="${dataPts}" fill="rgba(91,160,224,0.28)" stroke="#5ba0e0" stroke-width="2"/>`;

  // Data dots
  axes.forEach((v, i) => {
    const p = polarToCart(i, Math.min(v, max));
    svg += `<circle cx="${p.x}" cy="${p.y}" r="4" fill="#5ba0e0" stroke="#0d1525" stroke-width="1.5"/>`;
  });

  // Axis labels
  for (let i = 0; i < n; i++) {
    const a = startAngle + i * angleStep;
    const lx = cx + (r + 22) * Math.cos(a);
    const ly = cy + (r + 22) * Math.sin(a);
    const anchor = Math.abs(lx - cx) < 5 ? 'middle' : lx > cx ? 'start' : 'end';
    const label = AXES_JA[i].length > 6 ? AXES_JA[i].slice(0,5)+'…' : AXES_JA[i];
    svg += `<text x="${lx}" y="${ly + 4}" text-anchor="${anchor}" font-size="9" fill="#6878a0" font-family="'Noto Serif JP',sans-serif">${label}</text>`;
  }

  container.innerHTML = svg;
}

function switchTab(key) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === key));

}
