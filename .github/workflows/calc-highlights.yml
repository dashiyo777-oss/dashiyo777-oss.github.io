name: 注目の動き（ハイライト）計算

on:
  schedule:
    # 毎月4日 午前3時（JST）= UTC 18:00（前日）
    # 発言数(1日)・議員立法(3日)の月次更新が終わった後に実行
    - cron: '0 18 4 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry-run（差分表示のみ、ファイル更新・コミットなし）'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  calc:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ハイライト計算
        run: |
          DRY="${{ github.event.inputs.dry_run }}"
          # スケジュール実行は常に本番モード
          if [ "${{ github.event_name }}" = "schedule" ] || [ "$DRY" = "false" ]; then
            python3 scripts/calc_highlights.py
          else
            python3 scripts/calc_highlights.py --dry-run
          fi

      - name: highlights.json と facts_prev.json をコミット・プッシュ
        if: github.event_name == 'schedule' || github.event.inputs.dry_run == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add highlights.json facts_prev.json
          if git diff --staged --quiet; then
            echo "変更なし（スキップ）"
          else
            DATE=$(date +'%Y.%m.%d')
            git commit -m "ハイライト更新（${DATE}）"
            git push
          fi
