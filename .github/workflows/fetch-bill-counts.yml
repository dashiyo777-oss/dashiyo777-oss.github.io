name: 議員立法件数データ取得

on:
  schedule:
    # 毎月3日 午前3時（JST）= UTC 18:00（前日）
    - cron: '0 18 3 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        default: 'test'
        type: choice
        options:
          - test    # 第221回のみ（動作確認、約10分）
          - full    # 全15会期（第207〜221回、約70分）

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 議員立法件数を取得
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          if [ "$MODE" = "test" ]; then
            python3 scripts/fetch_bill_counts.py --test
          else
            python3 scripts/fetch_bill_counts.py
          fi

      - name: facts.json をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add facts.json
          if git diff --staged --quiet; then
            echo "変更なし（スキップ）"
          else
            DATE=$(date +'%Y.%m.%d')
            git commit -m "データ更新: 議員立法件数（${DATE}）"
            git push
          fi

      - name: 未照合名リストを確認
        if: always()
        run: |
          if [ -f unmatched_bill_names.txt ]; then
            echo "=== 未照合の発議者名 ==="
            cat unmatched_bill_names.txt
            echo "未照合件数（ユニーク）: $(wc -l < unmatched_bill_names.txt)"
          else
            echo "未照合なし"
          fi

      - name: エラーログを確認
        if: always()
        run: |
          if [ -f error_log.txt ]; then
            echo "=== エラーログ ==="
            tail -50 error_log.txt
          else
            echo "エラーなし"
          fi
